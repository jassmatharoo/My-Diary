<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Daily Diary</title>
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="My Daily Diary" />
  <style>
    :root {
      --bg: #f5f3ff;
      --surface: rgba(255,255,255,.82);
      --surface-2: rgba(255,255,255,.68);
      --text: #18181b;
      --muted: #5b6473;
      --border: rgba(255,255,255,.38);
      --shadow: 0 16px 40px rgba(0,0,0,.12);
      --accent-1: #8b5cf6;
      --accent-2: #ec4899;
      --accent-3: #f97316;
      --warn: #fbbf24;
      --danger: #ef4444;
      --today: #fb923c;
      --nav-h: 74px;
      --radius: 22px;
    }
    body.dark {
      --bg: #09090f;
      --surface: rgba(24,24,31,.82);
      --surface-2: rgba(39,39,51,.72);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --border: rgba(255,255,255,.08);
      --shadow: 0 18px 42px rgba(0,0,0,.34);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body {
      background-image:
        radial-gradient(circle at top left, color-mix(in oklab, var(--accent-1) 30%, transparent), transparent 36%),
        radial-gradient(circle at top right, color-mix(in oklab, var(--accent-2) 24%, transparent), transparent 34%),
        linear-gradient(135deg, color-mix(in oklab, var(--accent-1) 14%, transparent), color-mix(in oklab, var(--accent-2) 14%, transparent), color-mix(in oklab, var(--accent-3) 14%, transparent));
      transition: background .3s ease, color .3s ease;
    }
    #root { min-height: 100vh; }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; border: 0; }
    .app-shell { max-width: 720px; margin: 0 auto; min-height: 100vh; padding: env(safe-area-inset-top) 14px calc(var(--nav-h) + 18px) 14px; }
    .card {
      background: var(--surface);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 8px 0 14px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { width: 46px; height: 46px; border-radius: 16px; display: grid; place-items: center; background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3)); color: white; font-size: 24px; box-shadow: var(--shadow); }
    .brand h1 { margin: 0; font-size: 1.12rem; }
    .brand p, .muted { margin: 0; color: var(--muted); font-size: .92rem; }
    .section-title { font-size: 1.02rem; font-weight: 700; margin: 0 0 10px; }
    .row { display: flex; gap: 10px; }
    .row.wrap { flex-wrap: wrap; }
    .stack { display: flex; flex-direction: column; gap: 10px; }
    .spacer { flex: 1; }
    .btn {
      background: var(--surface-2);
      color: var(--text);
      padding: 12px 14px;
      min-height: 46px;
      border-radius: 16px;
      border: 1px solid var(--border);
      transition: transform .16s ease, background .2s ease, opacity .2s ease;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { color: white; background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3)); border: 0; }
    .btn-danger { color: white; background: linear-gradient(135deg, #ef4444, #f97316); border: 0; }
    .btn-ghost { background: transparent; border: 1px dashed var(--border); }
    .btn.small { min-height: 38px; padding: 9px 12px; border-radius: 14px; }
    .input, .textarea, .select {
      width: 100%;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
      min-height: 46px;
    }
    .textarea { min-height: 170px; resize: vertical; }
    .input:focus, .textarea:focus, .select:focus { box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent-1) 30%, transparent); }
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 18px; }
    .auth-card { width: 100%; max-width: 460px; padding: 18px; }
    .auth-card h2 { margin: 12px 0 6px; font-size: 1.45rem; }
    .auth-card p { color: var(--muted); margin: 0 0 16px; }
    .helper { font-size: .85rem; color: var(--muted); }
    .auth-switch { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
    .auth-link-row { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .text-btn { background: transparent; color: var(--accent-1); padding: 4px 0; min-height: 28px; }
    .calendar-card, .entry-card, .tasks-card, .search-card, .settings-card { padding: 14px; }
    .month-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .month-head h2 { margin: 0; font-size: 1.12rem; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
    .weekday { text-align: center; font-size: .78rem; color: var(--muted); padding: 6px 0; }
    .day-cell {
      min-height: 82px;
      border-radius: 18px;
      padding: 8px;
      position: relative;
      background: var(--surface-2);
      border: 1px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: space-between;
      overflow: hidden;
    }
    .day-cell.outside { opacity: .45; }
    .day-cell.today { box-shadow: inset 0 0 0 2px var(--today); }
    .day-cell.selected { border-color: color-mix(in oklab, var(--accent-2) 42%, transparent); }
    .day-num { font-weight: 700; font-size: .95rem; }
    .indicators { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: white; box-shadow: 0 0 0 1px rgba(0,0,0,.08); }
    .task-badge { min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; display: inline-grid; place-items: center; background: var(--warn); color: #27272a; font-size: .72rem; font-weight: 800; }
    .legend { margin-top: 12px; display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: .84rem; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .tasks-inline { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .task-pill { padding: 10px 12px; border-radius: 16px; background: color-mix(in oklab, var(--warn) 22%, var(--surface)); border: 1px solid color-mix(in oklab, var(--warn) 30%, transparent); }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 10px; }
    .photo-item { position: relative; }
    .photo-item img { width: 100%; height: 88px; object-fit: cover; border-radius: 16px; border: 1px solid var(--border); }
    .photo-remove { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 999px; background: rgba(0,0,0,.72); color: white; }
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-card { padding: 12px; border-radius: 18px; background: var(--surface-2); border: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
    .check { width: 22px; height: 22px; margin-top: 2px; }
    .task-title { font-weight: 700; margin: 0; }
    .task-title.done { text-decoration: line-through; opacity: .6; }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); color: var(--muted); font-size: .82rem; }
    .empty { padding: 24px 14px; text-align: center; color: var(--muted); }
    .search-results { display: flex; flex-direction: column; gap: 10px; }
    .search-item { padding: 12px; border-radius: 18px; background: var(--surface-2); border: 1px solid var(--border); }
    .nav {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: max(10px, env(safe-area-inset-bottom)); width: min(720px, calc(100vw - 18px));
      padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; z-index: 20;
      background: rgba(255,255,255,.72); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.35); border-radius: 24px; box-shadow: var(--shadow);
    }
    body.dark .nav { background: rgba(18,18,24,.78); border-color: rgba(255,255,255,.08); }
    .nav-btn { min-height: 56px; border-radius: 18px; background: transparent; color: var(--muted); display: grid; place-items: center; gap: 3px; }
    .nav-btn.active { color: white; background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3)); }
    .nav-btn span:first-child { font-size: 1.18rem; }
    .nav-btn span:last-child { font-size: .74rem; font-weight: 700; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: grid; place-items: end center; padding: 12px; z-index: 50; }
    .modal { width: min(720px, 100%); max-height: min(88vh, 900px); overflow: auto; padding: 14px; border-radius: 24px; }
    .toast-wrap { position: fixed; top: max(12px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); width: min(440px, calc(100vw - 20px)); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
    .toast { padding: 12px 14px; color: white; border-radius: 16px; box-shadow: var(--shadow); background: linear-gradient(135deg, rgba(24,24,27,.95), rgba(63,63,70,.95)); }
    .toast.success { background: linear-gradient(135deg, #16a34a, #10b981); }
    .toast.error { background: linear-gradient(135deg, #dc2626, #f97316); }
    .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .theme-btn { height: 52px; border-radius: 18px; border: 2px solid transparent; }
    .theme-btn.active { border-color: white; box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent-1) 30%, transparent); }
    .setting-row { display: flex; gap: 12px; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .setting-row:last-child { border-bottom: 0; }
    .toggle { width: 56px; height: 32px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); padding: 4px; position: relative; }
    .toggle::after { content: ''; display: block; width: 22px; height: 22px; border-radius: 999px; background: white; transition: transform .2s ease; }
    .toggle.on { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); }
    .toggle.on::after { transform: translateX(24px); }
    .file-link { display: inline-block; color: var(--accent-1); word-break: break-all; }
    .subtle { opacity: .75; }
    .divider { height: 1px; background: var(--border); margin: 10px 0; }
    @media (min-width: 720px) {
      .app-shell { padding-left: 22px; padding-right: 22px; }
      .calendar-card, .entry-card, .tasks-card, .search-card, .settings-card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    (() => {
      const e = React.createElement;
      const { useEffect, useMemo, useRef, useState } = React;

      const DB_NAME = 'my-daily-diary-db';
      const DB_VERSION = 2;
      const STORE_META = 'meta';
      const STORE_USERS = 'users';
      const STORE_ENTRIES = 'entries';
      const STORE_TASKS = 'tasks';
      const DEFAULT_SETTINGS = {
        theme: 'purple',
        displayMode: 'auto',
        reminderEnabled: false,
        reminderTime: '20:00',
        biometricEnabled: false,
      };
      const THEMES = {
        purple: ['#8b5cf6', '#ec4899', '#f97316'],
        blue: ['#2563eb', '#06b6d4', '#14b8a6'],
        green: ['#16a34a', '#10b981', '#0d9488'],
        orange: ['#f97316', '#ef4444', '#ec4899'],
        pink: ['#ec4899', '#f43f5e', '#8b5cf6'],
      };

      function openDb() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE_META)) db.createObjectStore(STORE_META, { keyPath: 'key' });
            if (!db.objectStoreNames.contains(STORE_USERS)) db.createObjectStore(STORE_USERS, { keyPath: 'username' });
            if (!db.objectStoreNames.contains(STORE_ENTRIES)) db.createObjectStore(STORE_ENTRIES, { keyPath: 'id' });
            if (!db.objectStoreNames.contains(STORE_TASKS)) db.createObjectStore(STORE_TASKS, { keyPath: 'id' });
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error || new Error('Unable to open database.'));
        });
      }

      async function withStore(storeName, mode, fn) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, mode);
          const store = tx.objectStore(storeName);
          const result = fn(store, tx);
          tx.oncomplete = () => resolve(result);
          tx.onerror = () => reject(tx.error || new Error('Database transaction failed.'));
          tx.onabort = () => reject(tx.error || new Error('Database transaction aborted.'));
        });
      }

      const dbApi = {
        async getMeta(key) {
          const db = await openDb();
          return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_META, 'readonly');
            const req = tx.objectStore(STORE_META).get(key);
            req.onsuccess = () => resolve(req.result ? req.result.value : undefined);
            req.onerror = () => reject(req.error || new Error('Failed to load metadata.'));
          });
        },
        async setMeta(key, value) {
          return withStore(STORE_META, 'readwrite', store => store.put({ key, value }));
        },
        async getUser(username) {
          const db = await openDb();
          return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_USERS, 'readonly');
            const req = tx.objectStore(STORE_USERS).get(username);
            req.onsuccess = () => resolve(req.result || null);
            req.onerror = () => reject(req.error || new Error('Failed to load user.'));
          });
        },
        async listUsers() {
          const db = await openDb();
          return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_USERS, 'readonly');
            const req = tx.objectStore(STORE_USERS).getAll();
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => reject(req.error || new Error('Failed to load users.'));
          });
        },
        async setUser(user) {
          return withStore(STORE_USERS, 'readwrite', store => store.put(user));
        },
        async getEntriesByUser(username) {
          const db = await openDb();
          return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_ENTRIES, 'readonly');
            const req = tx.objectStore(STORE_ENTRIES).getAll();
            req.onsuccess = () => {
              const out = {};
              (req.result || []).filter(item => item.username === username).forEach(item => { out[item.date] = item.data; });
              resolve(out);
            };
            req.onerror = () => reject(req.error || new Error('Failed to load diary entries.'));
          });
        },
        async setEntry(username, date, data) {
          return withStore(STORE_ENTRIES, 'readwrite', store => store.put({ id: `${username}::${date}`, username, date, data }));
        },
        async deleteEntry(username, date) {
          return withStore(STORE_ENTRIES, 'readwrite', store => store.delete(`${username}::${date}`));
        },
        async getTasksByUser(username) {
          const db = await openDb();
          return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_TASKS, 'readonly');
            const req = tx.objectStore(STORE_TASKS).getAll();
            req.onsuccess = () => resolve((req.result || []).filter(task => task.username === username));
            req.onerror = () => reject(req.error || new Error('Failed to load tasks.'));
          });
        },
        async setTask(task) {
          return withStore(STORE_TASKS, 'readwrite', store => store.put(task));
        },
        async deleteTask(id) {
          return withStore(STORE_TASKS, 'readwrite', store => store.delete(id));
        },
      };

      function fmtDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }
      function parseDateKey(key) {
        const [y,m,d] = key.split('-').map(Number);
        return new Date(y, m - 1, d);
      }
      function fullDate(key) {
        return parseDateKey(key).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }
      function monthTitle(date) {
        return date.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
      }
      function sha256(text) {
        const enc = new TextEncoder().encode(text);
        return crypto.subtle.digest('SHA-256', enc).then(buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join(''));
      }
      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error || new Error('Failed to read file.'));
          reader.readAsDataURL(file);
        });
      }
      function downloadJson(name, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }
      function sortTasks(tasks) {
        return [...tasks].sort((a,b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          const aa = `${a.dueDate}T${a.dueTime}`;
          const bb = `${b.dueDate}T${b.dueTime}`;
          return aa.localeCompare(bb);
        });
      }
      function taskCountByDate(tasks) {
        return tasks.reduce((acc, t) => { acc[t.dueDate] = (acc[t.dueDate] || 0) + (t.completed ? 0 : 1); return acc; }, {});
      }
      function isToday(key) { return key === fmtDate(new Date()); }
      function debounce(fn, ms) {
        let id;
        return (...args) => { clearTimeout(id); id = setTimeout(() => fn(...args), ms); };
      }
      function makeManifest() {
        const canvas = document.createElement('canvas');
        canvas.width = 192; canvas.height = 192;
        const ctx = canvas.getContext('2d');
        const g = ctx.createLinearGradient(0, 0, 192, 192);
        g.addColorStop(0, '#8b5cf6');
        g.addColorStop(.55, '#ec4899');
        g.addColorStop(1, '#f97316');
        ctx.fillStyle = g; ctx.fillRect(0, 0, 192, 192);
        ctx.font = '96px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('📔', 96, 104);
        const manifest = {
          name: 'My Daily Diary',
          short_name: 'Diary',
          start_url: '.',
          display: 'standalone',
          background_color: '#8b5cf6',
          theme_color: '#8b5cf6',
          icons: [{ src: canvas.toDataURL('image/png'), sizes: '192x192', type: 'image/png' }]
        };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
      }
      makeManifest();

      function Toasts({ toasts }) {
        return e('div', { className: 'toast-wrap' },
          toasts.map(t => e('div', { key: t.id, className: `toast ${t.type || ''}` }, t.message))
        );
      }

      function Modal({ open, onClose, children }) {
        if (!open) return null;
        return e('div', { className: 'modal-backdrop', onClick: onClose },
          e('div', { className: 'modal card', onClick: ev => ev.stopPropagation() }, children)
        );
      }

      function App() {
        const todayKey = fmtDate(new Date());
        const [loading, setLoading] = useState(true);
        const [authed, setAuthed] = useState(false);
        const [authMode, setAuthMode] = useState('login');
        const [currentUser, setCurrentUser] = useState(null);
        const [entries, setEntries] = useState({});
        const [tasks, setTasks] = useState([]);
        const [selectedDate, setSelectedDate] = useState(todayKey);
        const [monthCursor, setMonthCursor] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
        const [tab, setTab] = useState('calendar');
        const [settings, setSettings] = useState(DEFAULT_SETTINGS);
        const [taskModal, setTaskModal] = useState({ open: false, mode: 'create', task: null });
        const [taskDetail, setTaskDetail] = useState(null);
        const [search, setSearch] = useState('');
        const [toasts, setToasts] = useState([]);
        const [entryDraft, setEntryDraft] = useState({ text: '', photos: [], timestamp: new Date().toISOString() });
        const [authForm, setAuthForm] = useState({ username: '', password: '', confirmPassword: '', recoveryAnswer: '', fullName: '' });
        const [forgotForm, setForgotForm] = useState({ username: '', recoveryAnswer: '', newPassword: '' });
        const saveEntryDebounced = useRef(null);

        function toast(message, type='success') {
          const id = Math.random().toString(36).slice(2);
          setToasts(v => [...v, { id, message, type }]);
          setTimeout(() => setToasts(v => v.filter(x => x.id !== id)), 2600);
        }

        async function runSafe(action, errorMessage) {
          try {
            return await action();
          } catch (error) {
            console.error(error);
            toast(errorMessage || 'Something went wrong.', 'error');
            return null;
          }
        }

        async function loadUserData(username) {
          await runSafe(async () => {
            const user = await dbApi.getUser(username);
            const userSettings = user && user.settings ? { ...DEFAULT_SETTINGS, ...user.settings } : DEFAULT_SETTINGS;
            const allEntries = await dbApi.getEntriesByUser(username);
            const allTasks = await dbApi.getTasksByUser(username);
            setCurrentUser(user);
            setSettings(userSettings);
            setEntries(allEntries);
            setTasks(sortTasks(allTasks));
            setSelectedDate(todayKey);
            setMonthCursor(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
          }, 'Unable to load account data.');
        }

        useEffect(() => {
          runSafe(async () => {
            const sessionUsername = await dbApi.getMeta('sessionUser');
            if (sessionUsername) {
              await loadUserData(sessionUsername);
              setAuthed(true);
            }
          }, 'Unable to restore previous session.').finally(() => setLoading(false));
        }, []);

        useEffect(() => {
          const hour = new Date().getHours();
          const dark = settings.displayMode === 'dark' || (settings.displayMode === 'auto' && (hour < 6 || hour >= 18));
          document.body.classList.toggle('dark', dark);
          const theme = THEMES[settings.theme] || THEMES.purple;
          document.documentElement.style.setProperty('--accent-1', theme[0]);
          document.documentElement.style.setProperty('--accent-2', theme[1]);
          document.documentElement.style.setProperty('--accent-3', theme[2]);
        }, [settings]);

        useEffect(() => {
          const current = entries[selectedDate] || { text: '', photos: [], timestamp: new Date().toISOString() };
          setEntryDraft(current);
        }, [selectedDate, entries]);

        useEffect(() => {
          saveEntryDebounced.current = debounce(async (dateKey, draft) => {
            if (!currentUser) return;
            const cleaned = { text: (draft.text || '').trim(), photos: draft.photos || [], timestamp: new Date().toISOString() };
            if (!cleaned.text && (!cleaned.photos || !cleaned.photos.length)) {
              setEntries(prev => {
                const next = { ...prev };
                delete next[dateKey];
                return next;
              });
              await dbApi.deleteEntry(currentUser.username, dateKey);
              return;
            }
            await dbApi.setEntry(currentUser.username, dateKey, cleaned);
            setEntries(prev => ({ ...prev, [dateKey]: cleaned }));
          }, 500);
        }, [currentUser]);

        async function persistSettings(next) {
          setSettings(next);
          if (!currentUser) return;
          const updatedUser = { ...currentUser, settings: next };
          setCurrentUser(updatedUser);
          await runSafe(() => dbApi.setUser(updatedUser), 'Unable to save settings.');
        }

        async function registerUser() {
          const username = authForm.username.trim().toLowerCase();
          if (!username || username.length < 3) return toast('Username must be at least 3 characters.', 'error');
          if (!/^[a-z0-9._-]+$/.test(username)) return toast('Username can use letters, numbers, dots, underscores, and dashes.', 'error');
          if (authForm.password.length < 4) return toast('Password must be at least 4 characters.', 'error');
          if (authForm.password !== authForm.confirmPassword) return toast('Passwords do not match.', 'error');
          if (!authForm.recoveryAnswer.trim()) return toast('Recovery answer is required.', 'error');
          await runSafe(async () => {
            const existing = await dbApi.getUser(username);
            if (existing) return toast('That username already exists.', 'error');
            const passwordHash = await sha256(authForm.password);
            const recoveryHash = await sha256(authForm.recoveryAnswer.trim().toLowerCase());
            const user = {
              username,
              fullName: authForm.fullName.trim() || username,
              passwordHash,
              recoveryQuestion: 'What is your recovery word?',
              recoveryHash,
              createdAt: new Date().toISOString(),
              settings: DEFAULT_SETTINGS,
            };
            await dbApi.setUser(user);
            await dbApi.setMeta('sessionUser', username);
            setAuthForm({ username: '', password: '', confirmPassword: '', recoveryAnswer: '', fullName: '' });
            setAuthed(true);
            await loadUserData(username);
            toast('Account created successfully.');
          }, 'Unable to create account.');
        }

        async function loginUser() {
          const username = authForm.username.trim().toLowerCase();
          if (!username || !authForm.password) return toast('Enter username and password.', 'error');
          await runSafe(async () => {
            const user = await dbApi.getUser(username);
            if (!user) return toast('User not found.', 'error');
            const passwordHash = await sha256(authForm.password);
            if (passwordHash !== user.passwordHash) return toast('Incorrect password.', 'error');
            await dbApi.setMeta('sessionUser', username);
            setAuthed(true);
            setAuthForm({ username: '', password: '', confirmPassword: '', recoveryAnswer: '', fullName: '' });
            await loadUserData(username);
            toast(`Welcome back, ${user.fullName}.`);
          }, 'Unable to log in.');
        }

        async function resetPassword() {
          const username = forgotForm.username.trim().toLowerCase();
          if (!username || !forgotForm.recoveryAnswer || forgotForm.newPassword.length < 4) {
            return toast('Enter username, recovery answer, and a new password.', 'error');
          }
          await runSafe(async () => {
            const user = await dbApi.getUser(username);
            if (!user) return toast('User not found.', 'error');
            const recoveryHash = await sha256(forgotForm.recoveryAnswer.trim().toLowerCase());
            if (recoveryHash !== user.recoveryHash) return toast('Recovery answer is incorrect.', 'error');
            const passwordHash = await sha256(forgotForm.newPassword);
            await dbApi.setUser({ ...user, passwordHash, updatedAt: new Date().toISOString() });
            setForgotForm({ username: '', recoveryAnswer: '', newPassword: '' });
            setAuthMode('login');
            toast('Password reset successfully.');
          }, 'Unable to reset password.');
        }

          await runSafe(async () => {
            await dbApi.setMeta('sessionUser', null);
            setAuthed(false);
            setCurrentUser(null);
            setEntries({});
            setTasks([]);
            setTab('calendar');
            setAuthMode('login');
            toast('Logged out.');

          toast('Biometric login is browser-limited in a single-file app. Username and password remain the reliable option.', 'error');
        }

        async function saveTask(task) {
          if (!currentUser) return;
          await runSafe(async () => {
            const finalTask = { ...task, username: currentUser.username };
            await dbApi.setTask(finalTask);
            const exists = tasks.some(t => t.id === finalTask.id);
            const next = sortTasks(exists ? tasks.map(t => t.id === finalTask.id ? finalTask : t) : [...tasks, finalTask]);
            setTasks(next);
            toast(exists ? 'Task saved.' : 'Task created.');
          }, 'Unable to save task.');
        }

        async function toggleTask(task, completed) {
          await runSafe(async () => {
            const nextTask = { ...task, completed };
            await dbApi.setTask(nextTask);
            setTasks(sortTasks(tasks.map(t => t.id === task.id ? nextTask : t)));
          }, 'Unable to update task.');
        }

        async function deleteTask(id) {
          if (!confirm('Delete this task?')) return;
          await runSafe(async () => {
            await dbApi.deleteTask(id);
            setTasks(sortTasks(tasks.filter(t => t.id !== id)));
            setTaskDetail(null);
            setTaskModal({ open: false, mode: 'create', task: null });
            toast('Task deleted.');
          }, 'Unable to delete task.');
        }

        async function addPhotos(files) {
          await runSafe(async () => {
            const encoded = [];
            for (const f of Array.from(files || [])) encoded.push(await fileToBase64(f));
            const next = { ...entryDraft, photos: [...(entryDraft.photos || []), ...encoded] };
            setEntryDraft(next);
            saveEntryDebounced.current(selectedDate, next);
            toast('Photos added.');
          }, 'Unable to add photos.');

          const next = { ...entryDraft, text };
          setEntryDraft(next);
          saveEntryDebounced.current && saveEntryDebounced.current(selectedDate, next);
        }

        function removePhoto(idx) {
          const next = { ...entryDraft, photos: entryDraft.photos.filter((_, i) => i !== idx) };
          setEntryDraft(next);
          saveEntryDebounced.current && saveEntryDebounced.current(selectedDate, next);
          toast('Photo removed.');
        }

        async function deleteEntry() {
          if (!currentUser) return;
          if (!confirm('Delete this diary entry and all attached photos?')) return;
          await runSafe(async () => {
            await dbApi.deleteEntry(currentUser.username, selectedDate);
            const next = { ...entries };
            delete next[selectedDate];
            setEntries(next);
            setEntryDraft({ text: '', photos: [], timestamp: new Date().toISOString() });
            toast('Entry deleted.');
          }, 'Unable to delete entry.');
        }

        async function exportBackup(target) {
          if (!currentUser) return;
          await runSafe(async () => {
            const payload = {
              exportedAt: new Date().toISOString(),
              app: 'My Daily Diary',
              version: 2,
              user: currentUser.username,
              entries,
              tasks,
              settings,
            };
            const safeTarget = String(target).toLowerCase().split(' ').join('-');
            downloadJson(`my-daily-diary-${currentUser.username}-${safeTarget}-backup.json`, payload);
            toast(`Backup downloaded for ${target}.`);
          }, 'Unable to export backup.');
        }

        async function importBackup(file) {
          if (!file || !currentUser) return;
          await runSafe(async () => {
            const text = await file.text();
            const parsed = JSON.parse(text);
            if (!confirm('Restore backup and overwrite current entries, tasks, and settings for this user?')) return;
            const importedEntries = parsed.entries || {};
            const importedTasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
            const importedSettings = { ...DEFAULT_SETTINGS, ...(parsed.settings || {}) };
            for (const date of Object.keys(entries)) await dbApi.deleteEntry(currentUser.username, date);
            for (const task of tasks) await dbApi.deleteTask(task.id);
            for (const [date, data] of Object.entries(importedEntries)) await dbApi.setEntry(currentUser.username, date, data);
            for (const task of importedTasks) await dbApi.setTask({ ...task, username: currentUser.username, id: task.id || `${currentUser.username}-${Date.now()}-${Math.random()}` });
            const updatedUser = { ...currentUser, settings: importedSettings };
            await dbApi.setUser(updatedUser);
            setCurrentUser(updatedUser);
            setEntries(importedEntries);
            setTasks(sortTasks(importedTasks.map(task => ({ ...task, username: currentUser.username }))));
            setSettings(importedSettings);
            toast('Backup restored successfully.');
          }, 'Unable to restore backup.');
        }

        const tasksByDate = useMemo(() => taskCountByDate(tasks), [tasks]);
        const searchResults = useMemo(() => {

          return Object.entries(entries)

              )),

                e('button', { className: `btn ${authMode === 'register' ? 'btn-primary' : ''}`, onClick: () => setAuthMode('register') }, 'Register'),
                e('button', { className: `btn ${authMode === 'forgot' ? 'btn-primary' : ''}`, onClick: () => setAuthMode('forgot') }, 'Forgot')
              ),
              authMode === 'login' && e(React.Fragment, null,

                e('button', { className: 'btn btn-primary', onClick: loginUser }, 'Login'),
                e('button', { className: 'btn', onClick: maybeBiometricLogin }, 'Use fingerprint / biometric'),
                e('div', { className: 'auth-link-row' },

                  e('button', { className: 'text-btn', onClick: () => setAuthMode('forgot') }, 'Forgot password?')
                )
              ),
              authMode === 'register' && e(React.Fragment, null,
                e('h2', null, 'Create account'),
                e('input', { className: 'input', value: authForm.fullName, placeholder: 'Full name', onChange: ev => setAuthForm({ ...authForm, fullName: ev.target.value }) }),
                e('input', { className: 'input', value: authForm.username, placeholder: 'Choose username', onChange: ev => setAuthForm({ ...authForm, username: ev.target.value }) }),
                e('input', { className: 'input', type: 'password', value: authForm.password, placeholder: 'Create password', onChange: ev => setAuthForm({ ...authForm, password: ev.target.value }) }),
                e('input', { className: 'input', type: 'password', value: authForm.confirmPassword, placeholder: 'Confirm password', onChange: ev => setAuthForm({ ...authForm, confirmPassword: ev.target.value }) }),
                e('input', { className: 'input', value: authForm.recoveryAnswer, placeholder: 'Recovery word or answer', onChange: ev => setAuthForm({ ...authForm, recoveryAnswer: ev.target.value }) }),
                e('button', { className: 'btn btn-primary', onClick: registerUser }, 'Register user')
              ),
              authMode === 'forgot' && e(React.Fragment, null,
                e('h2', null, 'Reset password'),
                e('p', null, 'Use your username and recovery word to set a new password.'),
                e('input', { className: 'input', value: forgotForm.username, placeholder: 'Username', onChange: ev => setForgotForm({ ...forgotForm, username: ev.target.value }) }),
                e('input', { className: 'input', value: forgotForm.recoveryAnswer, placeholder: 'Recovery word or answer', onChange: ev => setForgotForm({ ...forgotForm, recoveryAnswer: ev.target.value }) }),
                e('input', { className: 'input', type: 'password', value: forgotForm.newPassword, placeholder: 'New password', onChange: ev => setForgotForm({ ...forgotForm, newPassword: ev.target.value }) }),
                e('button', { className: 'btn btn-primary', onClick: resetPassword }, 'Reset password')
              ),
              e('div', { className: 'helper' }, 'Each user has separate diary entries, tasks, and saved settings on this device.')
            )
          );
        }

        return e(React.Fragment, null,
          e(Toasts, { toasts }),
          e('div', { className: 'app-shell' },
            e('div', { className: 'topbar' },
              e('div', { className: 'brand' }, e('div', { className: 'brand-icon' }, '📔'), e('div', null,
                e('h1', null, 'My Daily Diary'),
                e('p', null, `${currentUser ? currentUser.fullName : ''}${currentUser ? ' · ' : ''}${tab === 'calendar' ? monthTitle(monthCursor) : tab[0].toUpperCase() + tab.slice(1)}`)
              )),
              e('button', { className: 'btn small', onClick: () => setSelectedDate(todayKey) }, 'Today')
            ),
            tab === 'calendar' && e(CalendarView, {
              monthCursor, setMonthCursor, selectedDate, setSelectedDate, entries, tasksByDate,
              dueToday, entryDraft, updateEntryText, addPhotos, removePhoto, deleteEntry,

            }),
            tab === 'tasks' && e(TasksView, { tasks, toggleTask, setTaskModal, setTaskDetail }),
            tab === 'search' && e(SearchView, { search, setSearch, results: searchResults, openEntry: date => { setSelectedDate(date); setTab('calendar'); } }),
            tab === 'settings' && e(SettingsView, {
              settings,
              currentUser,
              setSettings: persistSettings,
              exportBackup,

              onLogout: handleLogout,
              onBiometric: async () => toast('Password login is the reliable mode in this single-file app.', 'error')
            })
          ),
          e(BottomNav, { tab, setTab }),
          e(TaskFormModal, { currentUser, taskModal, onClose: () => setTaskModal({ open: false, mode: 'create', task: null }), onSave: saveTask }),
          e(TaskDetailModal, { task: taskDetail, onClose: () => setTaskDetail(null), onEdit: task => { setTaskDetail(null); setTaskModal({ open: true, mode: 'edit', task }); }, onDelete: deleteTask })
        );

      function CalendarView({ monthCursor, setMonthCursor, selectedDate, setSelectedDate, entries, tasksByDate, dueToday, entryDraft, updateEntryText, addPhotos, removePhoto, deleteEntry, setTaskModal, setTaskDetail }) {
        const first = new Date(monthCursor.getFullYear(), monthCursor.getMonth(), 1);
        const startOffset = (first.getDay() + 6) % 7;
        const daysInMonth = new Date(monthCursor.getFullYear(), monthCursor.getMonth() + 1, 0).getDate();
        const cells = [];
        for (let i = 0; i < startOffset; i++) {
          const d = new Date(first); d.setDate(first.getDate() - (startOffset - i));
          cells.push({ key: fmtDate(d), day: d.getDate(), outside: true });
        }
        for (let day = 1; day <= daysInMonth; day++) {
          const d = new Date(monthCursor.getFullYear(), monthCursor.getMonth(), day);
          cells.push({ key: fmtDate(d), day, outside: false });
        }
        while (cells.length % 7 !== 0 || cells.length < 42) {
          const prev = parseDateKey(cells[cells.length - 1].key);
          prev.setDate(prev.getDate() + 1);
          cells.push({ key: fmtDate(prev), day: prev.getDate(), outside: true });
        }

        return e('div', { className: 'stack' },
          e('div', { className: 'calendar-card card' },
            e('div', { className: 'month-head' },
              e('button', { className: 'btn small', onClick: () => setMonthCursor(new Date(monthCursor.getFullYear(), monthCursor.getMonth() - 1, 1)) }, '←'),
              e('h2', null, monthTitle(monthCursor)),
              e('div', { className: 'spacer' }),
              e('button', { className: 'btn small', onClick: () => setMonthCursor(new Date(monthCursor.getFullYear(), monthCursor.getMonth() + 1, 1)) }, '→')
            ),

            e('div', { className: 'calendar-grid' }, cells.map(cell =>
              e('button', {

                className: `day-cell ${cell.outside ? 'outside' : ''} ${selectedDate === cell.key ? 'selected' : ''} ${isToday(cell.key) ? 'today' : ''}`,
                onClick: () => setSelectedDate(cell.key)
              },
                e('div', { className: 'day-num' }, cell.day),
                e('div', { className: 'indicators' },
                  entries[cell.key] ? e('span', { className: 'dot' }) : null,

                )
              )
            )),

              e('div', { className: 'legend-item' }, e('span', { className: 'task-badge' }, '2'), 'Incomplete tasks'),

            ) : null,

          e('div', { className: 'section-title' }, 'Backup & restore'),
          e('div', { className: 'row wrap' },
            e('button', { className: 'btn', onClick: () => exportBackup('Google Drive') }, 'Export to Google Drive'),
            e('button', { className: 'btn', onClick: () => exportBackup('OneDrive') }, 'Export to OneDrive')
          ),
          e('label', { className: 'btn btn-ghost', style: { display: 'inline-grid', placeItems: 'center' } }, 'Import backup JSON', e('input', { type: 'file', accept: 'application/json', hidden: true, onChange: ev => importBackup(ev.target.files && ev.target.files[0]) })),
          e('div', { className: 'divider' }),
          e('button', { className: 'btn btn-danger', onClick: onLogout }, 'Logout')
        );
      }

      function TaskFormModal({ currentUser, taskModal, onClose, onSave }) {
        const seed = taskModal.task || {};
        const [form, setForm] = useState({});

        useEffect(() => {
          if (taskModal.open) {
            setForm({
              id: seed.id || `${currentUser ? currentUser.username : 'user'}-${Date.now()}`,
              username: currentUser ? currentUser.username : '',
              title: seed.title || '',
              dueDate: seed.dueDate || fmtDate(new Date()),
              dueTime: seed.dueTime || '09:00',
              notes: seed.notes || '',
              file: seed.file || '',
              fileName: seed.fileName || '',
              fileType: seed.fileType || '',
              completed: !!seed.completed,
              createdAt: seed.createdAt || new Date().toISOString(),
            });
          }
        }, [taskModal.open, taskModal.task, currentUser]);

        async function pickFile(file) {
          if (!file) return;
          if (!/^image\//.test(file.type) && file.type !== 'application/pdf') {
            alert('Only image or PDF files are supported.');
            return;
          }
          const file64 = await fileToBase64(file);
          setForm(prev => ({ ...prev, file: file64, fileName: file.name, fileType: file.type }));
        }
        async function submit() {
          if (!form.title.trim()) return alert('Task title is required.');
          if (!form.dueDate || !form.dueTime) return alert('Due date and time are required.');
          await onSave(form);
          onClose();
        }

        return e(Modal, { open: taskModal.open, onClose },
          e('div', { className: 'stack' },
            e('div', { className: 'section-title' }, taskModal.mode === 'edit' ? 'Edit task' : 'Create task'),
            e('input', { className: 'input', value: form.title || '', placeholder: 'Task title', onChange: ev => setForm({ ...form, title: ev.target.value }) }),
            e('div', { className: 'row' },
              e('input', { className: 'input', type: 'date', value: form.dueDate || '', onChange: ev => setForm({ ...form, dueDate: ev.target.value }) }),
              e('input', { className: 'input', type: 'time', value: form.dueTime || '', onChange: ev => setForm({ ...form, dueTime: ev.target.value }) })
            ),
            e('textarea', { className: 'textarea', style: { minHeight: '110px' }, value: form.notes || '', placeholder: 'Notes or description (optional)', onChange: ev => setForm({ ...form, notes: ev.target.value }) }),
            e('label', { className: 'btn', style: { display: 'inline-grid', placeItems: 'center' } }, form.fileName || 'Attach PDF or image', e('input', { hidden: true, type: 'file', accept: 'image/*,application/pdf', onChange: ev => pickFile(ev.target.files && ev.target.files[0]) })),
            e('div', { className: 'row wrap' },
              e('button', { className: 'btn btn-primary', onClick: submit }, taskModal.mode === 'edit' ? 'Save changes' : 'Create task'),
              e('button', { className: 'btn', onClick: onClose }, 'Cancel')
            )
          )
        );
      }

      function TaskDetailModal({ task, onClose, onEdit, onDelete }) {
        return e(Modal, { open: !!task, onClose }, task ?
          e('div', { className: 'stack' },
            e('div', { className: 'row' }, e('div', { className: 'section-title' }, task.title), e('div', { className: 'spacer' }), e('span', { className: 'chip' }, task.completed ? 'Completed' : 'Open')),
            e('div', { className: 'chip' }, `${task.dueDate} ${task.dueTime}`),
            task.notes ? e('div', null, task.notes) : e('div', { className: 'muted' }, 'No notes.'),
            task.file ? e('div', null,
              e('div', { className: 'muted' }, `Attachment: ${task.fileName}`),
              /^image\//.test(task.fileType) ? e('img', { src: task.file, alt: task.fileName, style: { width: '100%', borderRadius: '18px', border: '1px solid var(--border)' } }) : e('a', { className: 'file-link', href: task.file, download: task.fileName }, 'Download attached PDF')
            ) : null,
            e('div', { className: 'row wrap' },
              e('button', { className: 'btn btn-primary', onClick: () => onEdit(task) }, 'Edit'),
              e('button', { className: 'btn btn-danger', onClick: () => onDelete(task.id) }, 'Delete'),
              e('button', { className: 'btn', onClick: onClose }, 'Close')
            )
          ) : null
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    })();
  </script>
</body>
</html>
