<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Daily Diary</title>
  <meta name="theme-color" content="#a21caf" />
  <style>
    :root {
      --bg: #f5f3ff;
      --surface: rgba(255,255,255,.86);
      --surface-2: rgba(255,255,255,.72);
      --text: #18181b;
      --muted: #5b6473;
      --muted-2: #7c8594;
      --border: rgba(255,255,255,.38);
      --shadow: 0 18px 44px rgba(0,0,0,.14);
      --accent-1: #a21caf;
      --accent-2: #db2777;
      --accent-3: #fb7185;
      --warn: #fbbf24;
      --danger: #ef4444;
      --today: #fb923c;
      --event: #f472b6;
      --holiday: #60a5fa;
      --nav-h: 84px;
      --radius: 24px;
    }
    body.dark {
      --bg: #09090f;
      --surface: rgba(24,24,31,.84);
      --surface-2: rgba(39,39,51,.74);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --muted-2: #8c96a5;
      --border: rgba(255,255,255,.08);
      --shadow: 0 18px 42px rgba(0,0,0,.34);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { background-image: linear-gradient(160deg, var(--accent-1), var(--accent-2), var(--accent-3)); transition: background .3s ease, color .3s ease; }
    #root { min-height: 100vh; }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; border: 0; }
    .app-shell { max-width: 760px; margin: 0 auto; min-height: 100vh; padding: 14px 14px calc(var(--nav-h) + 18px); }
    .card { background: var(--surface); backdrop-filter: blur(18px); border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: var(--radius); }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 8px 0 14px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { width: 46px; height: 46px; border-radius: 16px; display: grid; place-items: center; background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3)); color: white; font-size: 24px; box-shadow: var(--shadow); }
    .brand h1 { margin: 0; font-size: 1.12rem; }
    .brand p, .muted { margin: 0; color: var(--muted); font-size: .92rem; }
    .section-title { font-size: 1.02rem; font-weight: 700; margin: 0 0 10px; }
    .row { display: flex; gap: 10px; }
    .row.wrap { flex-wrap: wrap; }
    .stack { display: flex; flex-direction: column; gap: 10px; }
    .spacer { flex: 1; }
    .btn { background: var(--surface-2); color: var(--text); padding: 12px 14px; min-height: 46px; border-radius: 16px; border: 1px solid var(--border); transition: transform .16s ease, background .2s ease, opacity .2s ease; }
    .btn:active { transform: scale(.98); }
    .btn-primary { color: white; background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3)); border: 0; }
    .btn-danger { color: white; background: linear-gradient(135deg, #ef4444, #f97316); border: 0; }
    .btn-ghost { background: transparent; border: 1px dashed var(--border); }
    .btn.small { min-height: 38px; padding: 9px 12px; border-radius: 14px; }
    .input, .textarea { width: 100%; background: rgba(255,255,255,.62); color: var(--text); border: 1px solid rgba(0,0,0,.08); border-radius: 16px; padding: 13px 14px; outline: none; min-height: 46px; }
    body.dark .input, body.dark .textarea { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.08); }
    .textarea { min-height: 170px; resize: vertical; }
    .input:focus, .textarea:focus { box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent-1) 30%, transparent); }
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 450px; padding: 32px 28px 26px; text-align: center; border-radius: 26px; }
    .auth-avatar { width: 84px; height: 84px; margin: 0 auto 16px; border-radius: 999px; display: grid; place-items: center; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: white; box-shadow: var(--shadow); overflow: hidden; }
    .auth-avatar .emoji { font-size: 42px; line-height: 1; transform: translateY(1px); }
    .auth-main-title { margin: 0; font-size: 2.05rem; font-weight: 800; color: var(--accent-1); }
    .auth-subtitle { margin: 6px 0 20px; color: var(--muted); font-size: 1.02rem; }
    .auth-form-section { text-align: left; margin-top: 6px; }
    .auth-field { margin-bottom: 10px; text-align: left; }
    .auth-input { border-radius: 14px; min-height: 52px; }
    .auth-primary { width: 100%; min-height: 50px; font-weight: 700; font-size: 1.02rem; border-radius: 14px; margin-top: 6px; }
    .auth-secondary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .auth-secondary { min-height: 48px; border-radius: 14px; background: rgba(17,24,39,.08); font-weight: 700; }
    body.dark .auth-secondary { background: rgba(255,255,255,.08); }
    .auth-inline-meta { text-align: center; margin-top: 10px; margin-bottom: 4px; font-size: .73rem; color: var(--muted-2); }
    .auth-inline-error { min-height: 18px; text-align: center; margin-top: 10px; font-size: .82rem; color: #dc2626; font-weight: 600; }
    body.dark .auth-inline-error { color: #fda4af; }
    .helper { font-size: .85rem; color: var(--muted); }
    .calendar-card, .entry-card, .tasks-card, .search-card, .settings-card, .important-card { padding: 14px; }
    .month-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .month-head h2 { margin: 0; font-size: 1.12rem; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
    .weekday { text-align: center; font-size: .78rem; color: var(--muted); padding: 6px 0; }
    .day-cell { min-height: 92px; border-radius: 18px; padding: 8px; background: var(--surface-2); border: 1px solid transparent; display: flex; flex-direction: column; gap: 6px; justify-content: space-between; overflow: hidden; }
    .day-cell.outside { opacity: .45; }
    .day-cell.today { box-shadow: inset 0 0 0 2px var(--today); }
    .day-cell.selected { border-color: color-mix(in oklab, var(--accent-2) 42%, transparent); }
    .day-num { font-weight: 800; font-size: 1.18rem; line-height: 1; }
    .holiday-mini { font-size: .62rem; color: var(--holiday); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .indicators { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: white; box-shadow: 0 0 0 1px rgba(0,0,0,.08); }
    .task-badge, .event-badge, .holiday-badge { min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; display: inline-grid; place-items: center; font-size: .72rem; font-weight: 800; }
    .task-badge { background: var(--warn); color: #27272a; }
    .event-badge { background: var(--event); color: white; }
    .holiday-badge { background: var(--holiday); color: white; }
    .legend { margin-top: 12px; display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: .84rem; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .tasks-inline { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .task-pill, .event-pill, .holiday-pill { padding: 10px 12px; border-radius: 16px; border: 1px solid var(--border); }
    .task-pill { background: color-mix(in oklab, var(--warn) 22%, var(--surface)); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
    .event-pill { background: color-mix(in oklab, var(--event) 18%, var(--surface)); border-color: color-mix(in oklab, var(--event) 28%, transparent); }
    .holiday-pill { background: color-mix(in oklab, var(--holiday) 18%, var(--surface)); border-color: color-mix(in oklab, var(--holiday) 28%, transparent); }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr)); gap: 10px; }
    .photo-item { position: relative; }
    .photo-item img { width: 100%; height: 88px; object-fit: cover; border-radius: 16px; border: 1px solid var(--border); }
    .photo-remove { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 999px; background: rgba(0,0,0,.72); color: white; }
    .task-list, .search-results, .important-list { display: flex; flex-direction: column; gap: 10px; }
    .task-card, .search-item, .important-item { padding: 12px; border-radius: 18px; background: var(--surface-2); border: 1px solid var(--border); }
    .task-card { display: flex; gap: 10px; align-items: flex-start; }
    .check { width: 22px; height: 22px; margin-top: 2px; }
    .task-title { font-weight: 700; margin: 0; }
    .task-title.done { text-decoration: line-through; opacity: .6; }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); color: var(--muted); font-size: .82rem; }
    .empty { padding: 24px 14px; text-align: center; color: var(--muted); }
    .nav { position: fixed; left: 50%; transform: translateX(-50%); bottom: max(10px, env(safe-area-inset-bottom)); width: min(760px, calc(100vw - 18px)); padding: 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; z-index: 20; background: rgba(255,255,255,.72); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.35); border-radius: 24px; box-shadow: var(--shadow); }
    body.dark .nav { background: rgba(18,18,24,.78); border-color: rgba(255,255,255,.08); }
    .nav-btn { min-height: 56px; border-radius: 18px; background: transparent; color: var(--muted); display: grid; place-items: center; gap: 3px; }
    .nav-btn.active { color: white; background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3)); }
    .nav-btn span:first-child { font-size: 1.12rem; }
    .nav-btn span:last-child { font-size: .68rem; font-weight: 700; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: grid; place-items: end center; padding: 12px; z-index: 50; }
    .modal { width: min(760px, 100%); max-height: min(88vh, 900px); overflow: auto; padding: 14px; border-radius: 24px; }
    .toast-wrap { position: fixed; top: max(12px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); width: min(440px, calc(100vw - 20px)); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
    .toast { padding: 12px 14px; color: white; border-radius: 16px; box-shadow: var(--shadow); background: linear-gradient(135deg, rgba(24,24,27,.95), rgba(63,63,70,.95)); }
    .toast.success { background: linear-gradient(135deg, #16a34a, #10b981); }
    .toast.error { background: linear-gradient(135deg, #dc2626, #f97316); }
    .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .theme-btn { height: 52px; border-radius: 18px; border: 2px solid transparent; }
    .theme-btn.active { border-color: white; box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent-1) 30%, transparent); }
    .setting-row { display: flex; gap: 12px; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .setting-row:last-child { border-bottom: 0; }
    .toggle { width: 56px; height: 32px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); padding: 4px; position: relative; }
    .toggle::after { content: ''; display: block; width: 22px; height: 22px; border-radius: 999px; background: white; transition: transform .2s ease; }
    .toggle.on { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); }
    .toggle.on::after { transform: translateX(24px); }
    .file-link { display: inline-block; color: var(--accent-1); word-break: break-all; }
    .divider { height: 1px; background: var(--border); margin: 10px 0; }
    @media (max-width: 420px) {
      .auth-main-title { font-size: 1.8rem; }
      .auth-secondary-row { grid-template-columns: 1fr; }
      .nav-btn span:last-child { font-size: .62rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    (() => {
      const e = React.createElement;
      const { useEffect, useMemo, useRef, useState } = React;
      const DB_NAME = 'my-daily-diary-db';
      const DB_VERSION = 5;
      const STORE_META = 'meta';
      const STORE_USERS = 'users';
      const STORE_ENTRIES = 'entries';
      const STORE_TASKS = 'tasks';
      const STORE_SPECIAL = 'specialDays';
      const HOLIDAY_RESOURCE_ID = 'caaa47de-8626-46a6-aa28-3d948c15c5d9';
      const DEFAULT_SETTINGS = { theme: 'purple', displayMode: 'auto', reminderEnabled: false, reminderTime: '20:00', biometricEnabled: false, specialDayNotifications: true };
      const THEMES = { purple: ['#8b5cf6', '#ec4899', '#f97316'], blue: ['#2563eb', '#06b6d4', '#14b8a6'], green: ['#16a34a', '#10b981', '#0d9488'], orange: ['#f97316', '#ef4444', '#ec4899'], pink: ['#ec4899', '#f43f5e', '#8b5cf6'] };

      function openDb() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE_META)) db.createObjectStore(STORE_META, { keyPath: 'key' });
            if (!db.objectStoreNames.contains(STORE_USERS)) db.createObjectStore(STORE_USERS, { keyPath: 'username' });
            if (!db.objectStoreNames.contains(STORE_ENTRIES)) db.createObjectStore(STORE_ENTRIES, { keyPath: 'id' });
            if (!db.objectStoreNames.contains(STORE_TASKS)) db.createObjectStore(STORE_TASKS, { keyPath: 'id' });
            if (!db.objectStoreNames.contains(STORE_SPECIAL)) db.createObjectStore(STORE_SPECIAL, { keyPath: 'id' });
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error || new Error('Unable to open database.'));
        });
      }
      async function withStore(storeName, mode, fn) {
        const db = await openDb();
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, mode);
          const store = tx.objectStore(storeName);
          const result = fn(store, tx);
          tx.oncomplete = () => resolve(result);
          tx.onerror = () => reject(tx.error || new Error('Database transaction failed.'));
          tx.onabort = () => reject(tx.error || new Error('Database transaction aborted.'));
        });
      }
      const dbApi = {
        async getMeta(key) { const db = await openDb(); return new Promise((resolve, reject) => { const req = db.transaction(STORE_META, 'readonly').objectStore(STORE_META).get(key); req.onsuccess = () => resolve(req.result ? req.result.value : undefined); req.onerror = () => reject(req.error || new Error('Failed to load metadata.')); }); },
        async setMeta(key, value) { return withStore(STORE_META, 'readwrite', store => store.put({ key, value })); },
        async getUser(username) { const db = await openDb(); return new Promise((resolve, reject) => { const req = db.transaction(STORE_USERS, 'readonly').objectStore(STORE_USERS).get(username); req.onsuccess = () => resolve(req.result || null); req.onerror = () => reject(req.error || new Error('Failed to load user.')); }); },
        async listUsers() { const db = await openDb(); return new Promise((resolve, reject) => { const req = db.transaction(STORE_USERS, 'readonly').objectStore(STORE_USERS).getAll(); req.onsuccess = () => resolve(req.result || []); req.onerror = () => reject(req.error || new Error('Failed to load users.')); }); },
        async setUser(user) { return withStore(STORE_USERS, 'readwrite', store => store.put(user)); },
        async deleteUser(username) { return withStore(STORE_USERS, 'readwrite', store => store.delete(username)); },
        async getEntriesByUser(username) { const db = await openDb(); return new Promise((resolve, reject) => { const req = db.transaction(STORE_ENTRIES, 'readonly').objectStore(STORE_ENTRIES).getAll(); req.onsuccess = () => { const out = {}; (req.result || []).filter(item => item.username === username).forEach(item => { out[item.date] = item.data; }); resolve(out); }; req.onerror = () => reject(req.error || new Error('Failed to load entries.')); }); },
        async setEntry(username, date, data) { return withStore(STORE_ENTRIES, 'readwrite', store => store.put({ id: username + '::' + date, username, date, data })); },
        async deleteEntry(username, date) { return withStore(STORE_ENTRIES, 'readwrite', store => store.delete(username + '::' + date)); },
        async getTasksByUser(username) { const db = await openDb(); return new Promise((resolve, reject) => { const req = db.transaction(STORE_TASKS, 'readonly').objectStore(STORE_TASKS).getAll(); req.onsuccess = () => resolve((req.result || []).filter(task => task.username === username)); req.onerror = () => reject(req.error || new Error('Failed to load tasks.')); }); },
        async setTask(task) { return withStore(STORE_TASKS, 'readwrite', store => store.put(task)); },
        async deleteTask(id) { return withStore(STORE_TASKS, 'readwrite', store => store.delete(id)); },
        async getSpecialDaysByUser(username) { const db = await openDb(); return new Promise((resolve, reject) => { const req = db.transaction(STORE_SPECIAL, 'readonly').objectStore(STORE_SPECIAL).getAll(); req.onsuccess = () => resolve((req.result || []).filter(item => item.username === username)); req.onerror = () => reject(req.error || new Error('Failed to load important days.')); }); },
        async setSpecialDay(item) { return withStore(STORE_SPECIAL, 'readwrite', store => store.put(item)); },
        async deleteSpecialDay(id) { return withStore(STORE_SPECIAL, 'readwrite', store => store.delete(id)); }
      };

      function fmtDate(date) { const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, '0'); const d = String(date.getDate()).padStart(2, '0'); return y + '-' + m + '-' + d; }
      function parseDateKey(key) { const parts = key.split('-').map(Number); return new Date(parts[0], parts[1] - 1, parts[2]); }
      function fullDate(key) { return parseDateKey(key).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); }
      function monthTitle(date) { return date.toLocaleDateString(undefined, { month: 'long', year: 'numeric' }); }
      function sha256(text) { return crypto.subtle.digest('SHA-256', new TextEncoder().encode(text)).then(buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('')); }
      function fileToBase64(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.onerror = () => reject(reader.error || new Error('Failed to read file.')); reader.readAsDataURL(file); }); }
      function downloadJson(name, data) { const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = name; a.click(); setTimeout(() => URL.revokeObjectURL(url), 2000); }
      function sortTasks(tasks) { return tasks.slice().sort((a, b) => { if (a.completed !== b.completed) return a.completed ? 1 : -1; return (a.dueDate + 'T' + a.dueTime).localeCompare(b.dueDate + 'T' + b.dueTime); }); }
      function taskCountByDate(tasks) { return tasks.reduce((acc, t) => { acc[t.dueDate] = (acc[t.dueDate] || 0) + (t.completed ? 0 : 1); return acc; }, {}); }
      function specialCountByDate(items, year) { const out = {}; items.forEach(item => { const key = item.recurring ? year + '-' + item.monthDay : item.date; out[key] = (out[key] || 0) + 1; }); return out; }
      function eventDateForYear(item, year) { return item.recurring ? year + '-' + item.monthDay : item.date; }
      function sameMonthDay(dateKey, monthDay) { return dateKey.slice(5) === monthDay; }
      function isToday(key) { return key === fmtDate(new Date()); }
      function debounce(fn, ms) { let id; return (...args) => { clearTimeout(id); id = setTimeout(() => fn(...args), ms); }; }
      function ddmmyyyyToIso(s) { const parts = String(s || '').split('/'); if (parts.length !== 3) return null; return parts[2] + '-' + parts[1].padStart(2, '0') + '-' + parts[0].padStart(2, '0'); }
      function makeManifest() { const canvas = document.createElement('canvas'); canvas.width = 192; canvas.height = 192; const ctx = canvas.getContext('2d'); const g = ctx.createLinearGradient(0, 0, 192, 192); g.addColorStop(0, '#a21caf'); g.addColorStop(.5, '#db2777'); g.addColorStop(1, '#fb7185'); ctx.fillStyle = g; ctx.fillRect(0, 0, 192, 192); ctx.font = '96px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('📔', 96, 104); const manifest = { name: 'My Daily Diary', short_name: 'Diary', start_url: '.', display: 'standalone', background_color: '#a21caf', theme_color: '#a21caf', icons: [{ src: canvas.toDataURL('image/png'), sizes: '192x192', type: 'image/png' }] }; const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' }); const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob); document.head.appendChild(link); }
      makeManifest();

      function Toasts({ toasts }) { return e('div', { className: 'toast-wrap' }, toasts.map(t => e('div', { key: t.id, className: 'toast ' + (t.type || '') }, t.message))); }
      function Modal({ open, onClose, children }) { if (!open) return null; return e('div', { className: 'modal-backdrop', onClick: onClose }, e('div', { className: 'modal card', onClick: ev => ev.stopPropagation() }, children)); }

      function App() {
        const todayKey = fmtDate(new Date());
        const [loading, setLoading] = useState(true);
        const [authed, setAuthed] = useState(false);
        const [authMode, setAuthMode] = useState('login');
        const [authError, setAuthError] = useState('');
        const [currentUser, setCurrentUser] = useState(null);
        const [entries, setEntries] = useState({});
        const [tasks, setTasks] = useState([]);
        const [specialDays, setSpecialDays] = useState([]);
        const [holidays, setHolidays] = useState({});
        const [selectedDate, setSelectedDate] = useState(todayKey);
        const [monthCursor, setMonthCursor] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1));
        const [tab, setTab] = useState('calendar');
        const [settings, setSettings] = useState(DEFAULT_SETTINGS);
        const [taskModal, setTaskModal] = useState({ open: false, mode: 'create', task: null });
        const [taskDetail, setTaskDetail] = useState(null);
        const [specialModal, setSpecialModal] = useState({ open: false, mode: 'create', item: null });
        const [search, setSearch] = useState('');
        const [toasts, setToasts] = useState([]);
